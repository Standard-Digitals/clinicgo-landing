<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clinic-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#clinic-gradient)"/>
  
  <!-- Stethoscope Icon (Medical Theme) -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Stethoscope earpieces -->
    <circle cx="-45" cy="-60" r="18" fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <circle cx="45" cy="-60" r="18" fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
    
    <!-- Stethoscope tube connecting earpieces -->
    <path d="M -27 -50 Q -40 -20 -40 20 Q -40 60 0 80 Q 40 60 40 20 Q 40 -20 27 -50" 
          fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Stethoscope diaphragm (circle at bottom) -->
    <circle cx="0" cy="85" r="28" fill="none" stroke="white" stroke-width="14"/>
    <circle cx="0" cy="85" r="18" fill="white" opacity="0.3"/>
    
    <!-- Calendar accent (small) -->
    <g transform="translate(55, -70)">
      <rect x="-12" y="-12" width="24" height="24" rx="3" fill="white" opacity="0.2" stroke="white" stroke-width="2"/>
      <line x1="-8" y1="-6" x2="8" y2="-6" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <circle cx="-4" cy="0" r="1.5" fill="white" opacity="0.6"/>
      <circle cx="4" cy="0" r="1.5" fill="white" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Accent dots -->
  <circle cx="80" cy="80" r="8" fill="white" opacity="0.3"/>
  <circle cx="432" cy="432" r="8" fill="white" opacity="0.3"/>
</svg>
