<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinic Go - A modern healthcare appointment booking system for clinics and medical practices.</title>
    <meta name="description" content="A modern healthcare appointment booking system for clinics, medical practices, and healthcare providers." />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
  </head>
  <body>
    <!-- Netlify Forms hidden form for SPA detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="clinic" />
      <input name="pluginInterest" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
